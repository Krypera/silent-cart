name: Bug report
description: Report a real bug or regression in SilentCart
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen instead.
      placeholder: After payment confirmation, the order stayed in confirmed and no delivery was sent.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps so the maintainer can replay the issue.
      placeholder: |
        1. Create a fixed-XMR product
        2. Open checkout
        3. Pay exact amount
        4. Wait for 1 confirmation
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the relevant deployment details.
      placeholder: |
        - OS:
        - Node.js version:
        - Docker / local run:
        - PostgreSQL version:
        - wallet-rpc / monerod setup:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove secrets, payloads, license keys, wallet credentials, and private URLs before sharing.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I removed secrets and sensitive fulfillment data from this report.
          required: true
