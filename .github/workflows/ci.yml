name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: silentcart_test
          POSTGRES_USER: silentcart
          POSTGRES_PASSWORD: silentcart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U silentcart -d silentcart_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Run Postgres smoke tests
        env:
          TEST_DATABASE_URL: postgres://silentcart:silentcart@localhost:5432/silentcart_test
        run: npm run test:postgres

      - name: Build Docker image
        run: docker build .
