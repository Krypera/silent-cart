services:
  app:
    build:
      context: .
    env_file:
      - .env
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: silentcart
      POSTGRES_USER: silentcart
      POSTGRES_PASSWORD: silentcart
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silentcart -d silentcart"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
